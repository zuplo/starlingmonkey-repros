spin_manifest_version = 2

[application]
name = "fetch-redirect"
version = "0.1.0"

[[trigger.http]]
route = "/..."
component = "fetch-redirect"

[component.fetch-redirect]
source = "dist/fetch-redirect.wasm"
exclude_files = ["**/node_modules"]
allowed_outbound_hosts = ["https://*:*"]
[component.fetch-redirect.build]
command = ["npm install", "npm run build"]
watch = ["src/**/*.js"]
