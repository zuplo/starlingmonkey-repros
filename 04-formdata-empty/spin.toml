spin_manifest_version = 2

[application]
authors = []
description = "Repro: FormData drops empty fields"
name = "formdata-empty"
version = "0.1.0"

[[trigger.http]]
route = "/..."
component = "formdata-empty"

[component.formdata-empty]
source = "dist/formdata-empty.wasm"
exclude_files = ["**/node_modules"]
[component.formdata-empty.build]
command = ["npm install", "npm run build"]
watch = ["src/**/*.js"]
